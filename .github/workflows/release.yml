name: Release

run-name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
    
jobs:

  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Prepare asset
        run: |
          mkdir release
          cp Flow/bin/Release/netstandard2.0/* release/
          zip -r Flow-${{ github.ref_name }}.zip release

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: Flow-${{ github.ref_name }}.zip